<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ship Delete Confirm Modal</title>
  <script src="https://kit.fontawesome.com/da08280601.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../../shared/css/design-tokens.css" />
  <link rel="stylesheet" href="../../job-detail.css" />
  <link rel="stylesheet" href="../../components/modal-shell.css" />
  <link rel="stylesheet" href="../../components/shipping-tab/shipping-tab.css" />
  <link rel="stylesheet" href="ship-delete-confirm-modal.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />
</head>

<body data-theme="titanium">
  <div class="modal-overlay modal-centered" id="modal-shipDeleteConfirm"
    onclick="handleOverlayClick(event, 'shipDeleteConfirm')">
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title" id="shipDeleteConfirmTitle">Delete addresses?</span>
        <button class="icon-btn" onclick="cancelShipDelete()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <p class="ship-delete-warning">This action cannot be undone</p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="cancelShipDelete()">Cancel</button>
        <button class="btn-primary btn-danger" onclick="confirmDeleteSelected()">Delete</button>
      </div>
    </div>
  </div>

  <!-- Ship Settings modal -->
  <div class="modal-overlay" id="modal-shipSettings" onclick="handleOverlayClick(event, 'shipSettings')">
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title">Shipping Table Settings</span>
        <button class="icon-btn" onclick="closeModal('shipSettings')"><i class="fa-regular fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <p class="ship-settings-note"><i class="fa-regular fa-clock"></i> These settings are temporary and will reset if
          you leave or refresh the page.</p>

        <div class="ship-settings-group">

          <!-- Address Column -->
          <div class="ship-settings-row">
            <label for="sToggleColAddr" class="ship-settings-label">Hide Address Column</label>
            <label class="toggle-switch">
              <input type="checkbox" id="sToggleColAddr" onchange="toggleShipCol('addr', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="ship-settings-row ship-settings-row--sub">
            <label for="sToggleFieldAttn" class="ship-settings-label">Hide ATTN Field</label>
            <label class="toggle-switch">
              <input type="checkbox" id="sToggleFieldAttn" class="addr-subfield"
                onchange="toggleShipField('attn', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="ship-settings-row ship-settings-row--sub">
            <label for="sToggleFieldAddrName" class="ship-settings-label">Hide Address Name Field</label>
            <label class="toggle-switch">
              <input type="checkbox" id="sToggleFieldAddrName" class="addr-subfield"
                onchange="toggleShipField('addr-name', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="ship-settings-row ship-settings-row--sub">
            <label for="sToggleFieldAddrStreet" class="ship-settings-label">Hide Address Field</label>
            <label class="toggle-switch">
              <input type="checkbox" id="sToggleFieldAddrStreet" class="addr-subfield"
                onchange="toggleShipField('addr-street', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>

          <hr class="ship-settings-divider">

          <!-- Delivery Column -->
          <div class="ship-settings-row">
            <label for="sToggleColDelivery" class="ship-settings-label">Hide Delivery Column</label>
            <label class="toggle-switch">
              <input type="checkbox" id="sToggleColDelivery" onchange="toggleShipCol('delivery', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="ship-settings-row ship-settings-row--sub">
            <label for="sToggleFieldCarrier" class="ship-settings-label">Hide Carrier Field</label>
            <label class="toggle-switch">
              <input type="checkbox" id="sToggleFieldCarrier" class="delivery-subfield"
                onchange="toggleShipField('carrier', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="ship-settings-row ship-settings-row--sub">
            <label for="sToggleFieldMethod" class="ship-settings-label">Hide Method Field</label>
            <label class="toggle-switch">
              <input type="checkbox" id="sToggleFieldMethod" class="delivery-subfield"
                onchange="toggleShipField('method-type', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="ship-settings-row ship-settings-row--sub">
            <label for="sToggleFieldAccount" class="ship-settings-label">Hide Account Field</label>
            <label class="toggle-switch">
              <input type="checkbox" id="sToggleFieldAccount" class="delivery-subfield"
                onchange="toggleShipField('account', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>

          <hr class="ship-settings-divider">

          <!-- Notes Column -->
          <div class="ship-settings-row">
            <label for="sToggleColNotes" class="ship-settings-label">Hide Notes Column</label>
            <label class="toggle-switch">
              <input type="checkbox" id="sToggleColNotes" onchange="toggleShipCol('notes', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>

          <hr class="ship-settings-divider">

          <!-- QTY Column -->
          <div class="ship-settings-row">
            <label for="sToggleColQty" class="ship-settings-label">Hide QTY Column</label>
            <label class="toggle-switch">
              <input type="checkbox" id="sToggleColQty" onchange="toggleShipCol('qty', this.checked)">
              <span class="toggle-slider"></span>
            </label>
          </div>

        </div>
      </div>
    </div>
  </div>

</body>

</html>
