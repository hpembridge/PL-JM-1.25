<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Job Modal</title>
  <script src="https://kit.fontawesome.com/da08280601.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../../shared/css/design-tokens.css" />
  <link rel="stylesheet" href="../../job-detail.css" />
  <link rel="stylesheet" href="../../components/modal-shell.css" />
  <link rel="stylesheet" href="edit-job-modal.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />
</head>

<body data-theme="titanium">
  <div class="modal-overlay" id="modal-editJob" onclick="handleOverlayClick(event, 'editJob')">
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title">Edit job information</span>
        <button class="icon-btn" onclick="closeModal('editJob')"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">

        <div class="detail-edit-panel active">
          <div class="check-grid check-grid-2">
            <label><input type="checkbox" checked /> For Distribution</label>
          </div>
          <div class="form-row form-row-2">
            <div class="form-group">
              <label class="form-label">PO Number</label>
              <input class="form-input" type="text"  />
            </div>
            <div class="form-group">
              <label class="form-label">PO Name</label>
              <input class="form-input" type="text"  />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Job Name</label>
            <input class="form-input" type="text" value="2018 Standard Menu Single Fold Jan 2018 Ws" />
          </div>
          <div class="form-row form-row-2">
            <div>
              <label class="form-label">Job Type</label>
              <select class="form-select" id="jobTypeSelect" onchange="onJobTypeChange(this)">
                <option value="new" selected>New Job</option>
                <option value="rerun">Re-run with Changes</option>
                <option value="pullplate">Pull-Plate</option>
              </select>
            </div>
            <div id="oldJobNumField" class="collapsed">
              <label class="form-label">Old Job Num</label>
              <input class="form-input" type="text" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Production Type</label>
            <select class="form-select">
              <option selected>Printing</option>
              <option>Digital</option>
              <option>Embroidery</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Menu Code</label>
            <input class="form-input" type="text" />
          </div>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal('editJob')">Cancel</button>
        <button class="btn-primary" onclick="saveModal('editJob')">Save</button>
      </div>
    </div>
  </div>

</body>

</html>
