<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Detail Page</title>
  <script src="https://kit.fontawesome.com/da08280601.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="shared/css/design-tokens.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="job-detail.css" />
  <link rel="stylesheet" href="components/modal-shell.css" />
  <link rel="stylesheet" href="components/topbar/topbar.css" />
  <link rel="stylesheet" href="components/job-header/job-header.css" />
  <link rel="stylesheet" href="components/production-tab/production-tab.css" />
  <link rel="stylesheet" href="components/shipping-tab/shipping-tab.css" />
  <link rel="stylesheet" href="modals/detail-edit-modal/detail-edit-modal.css" />
  <link rel="stylesheet" href="modals/trello-confirm-modal/trello-confirm-modal.css" />
  <link rel="stylesheet" href="modals/proof-contacts-modal/proof-contacts-modal.css" />
  <link rel="stylesheet" href="modals/scan-history-modal/scan-history-modal.css" />
  <link rel="stylesheet" href="modals/manage-notes-modal/manage-notes-modal.css" />
  <link rel="stylesheet" href="modals/edit-job-modal/edit-job-modal.css" />
  <link rel="stylesheet" href="modals/ship-edit-modal/ship-edit-modal.css" />
  <link rel="stylesheet" href="modals/ship-delete-confirm-modal/ship-delete-confirm-modal.css" />
  <link rel="stylesheet" href="modals/ship-settings-modal/ship-settings-modal.css" />
  <link rel="stylesheet" href="modals/billing-details-modal/billing-details-modal.css" />
</head>

<body data-theme="titanium">
  <div class="main">

    <!-- ── TOP BAR (components/topbar) ── -->
    <div data-include="components/topbar/topbar.html"></div>

    <!-- ── PAGE CONTENT ── -->
    <div class="page-content">
      <!-- ── JOB HEADER — account card style (components/job-header) ── -->
      <div data-include="components/job-header/job-header.html"></div>

      <!-- ── TABS ── -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(this, 'production')">Production</button>
        <button class="tab-btn" onclick="switchTab(this, 'shipping')">Shipping</button>
      </div>
    </div>

    <!-- ── SHIPPING PANEL (components/shipping-tab) ── -->
    <div data-include="components/shipping-tab/shipping-tab.html"></div>

    <!-- ── PRODUCTION PANEL (components/production-tab) ── -->
    <div data-include="components/production-tab/production-tab.html"></div>

    <!-- ── BILLING PANEL (no unique styles/behavior — shares proof-contacts-modal) ── -->

  </div><!-- /page-content -->
  </div><!-- /main -->

  <!-- ── MODAL: Detail Edit — tabbed (modals/detail-edit-modal) ── -->
  <div data-include="modals/detail-edit-modal/detail-edit-modal.html"></div>

  <!-- ── MODAL: Edit Job Info (modals/edit-job-modal) ── -->
  <div data-include="modals/edit-job-modal/edit-job-modal.html"></div>

  <!-- ── MODAL: Trello Confirm (modals/trello-confirm-modal) ── -->
  <div data-include="modals/trello-confirm-modal/trello-confirm-modal.html"></div>

  <!-- ── MODAL: Manage Job Contacts (modals/proof-contacts-modal) ── -->
  <div data-include="modals/proof-contacts-modal/proof-contacts-modal.html"></div>

  <!-- ── MODAL: Scan History (modals/scan-history-modal) ── -->
  <div data-include="modals/scan-history-modal/scan-history-modal.html"></div>

  <!-- ── MODAL: Manage Notes (modals/manage-notes-modal) ── -->
  <div data-include="modals/manage-notes-modal/manage-notes-modal.html"></div>

  <!-- ── MODAL: Ship Address Edit (modals/ship-edit-modal) ── -->
  <div data-include="modals/ship-edit-modal/ship-edit-modal.html"></div>

  <!-- ── MODAL: Delete Shipping Addresses Confirm (modals/ship-delete-confirm-modal) ── -->
  <div data-include="modals/ship-delete-confirm-modal/ship-delete-confirm-modal.html"></div>

  <!-- ── MODAL: Shipping Table Settings (modals/ship-settings-modal) ── -->
  <div data-include="modals/ship-settings-modal/ship-settings-modal.html"></div>

  <!-- ── MODAL: View Billing Details (modals/billing-details-modal) ── -->
  <div data-include="modals/billing-details-modal/billing-details-modal.html"></div>

  <!-- Toast -->
  <div class="toast" id="toast">Detail saved</div>

  <script src="loader.js"></script>
</body>

</html>
